include = ../../global.properties

sender.prepare.className   = org.frankframework.senders.IbisJavaSender
sender.prepare.serviceName = ibis4test-cache-sender-params

sender.test.className   = org.frankframework.senders.IbisJavaSender
sender.test.serviceName = ibis4test-cache-sender-params

# This is mostly the same behaviour as the sender without params, but we want to make sure that both the deprecated behaviour as well as the new
# param- based behaviour is tested, so we have separate scenarios for both. The scenarios are the same, but the underlying configuration differs.
# Scenario 1 and 2 don't rely on params and are not duplicated.
