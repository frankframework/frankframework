scenario.description = Insert with exception (transport succeeded message is HTML in errorstorage ready to be sent again)

include = common.properties

# clear both the ibisstore and ibistemp tables
step1.jdbc.deleteTableIbisStore.read = 10/jdbc-delete.xml
step2.jdbc.deleteTableIbisTemp.read = 10/jdbc-delete.xml

# first time after inserting we should return a response and put message in errorstorage
step3.java.ApiListener.write = 10/call-exception-insert.xml
step4.java.ApiListener.read = 10/exception-insert-result.txt

# message not processed successfully trying again, should return 200 ok
step5.java.ApiListener.write = 10/call-exception-insert.xml
step6.java.ApiListener.read = 10/empty-result.txt

step7.manage.db.write = 10/md-select.xml
step8.manage.db.read = 10/md-select-result.xml

ignoreContentBetweenKeys3.key1=http
ignoreContentBetweenKeys3.key2=/api/
