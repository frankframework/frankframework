include = ../../global.properties

java.openApiValidator.className=org.frankframework.senders.IbisJavaSender
java.openApiValidator.serviceName=ibis4test-openApiValidator

api.openApiValidator.className=org.frankframework.http.HttpSender
api.openApiValidator.url=${web.protocol}://${web.host}:${web.port}${web.contextpath}/api/openapivalidator/item/post
api.openApiValidator.methodType=POST
api.openApiValidator.authAlias=${framework.api.user.alias}
