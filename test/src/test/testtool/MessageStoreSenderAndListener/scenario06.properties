scenario.description = MessageStoreSender - test with Correlation Id retrieved by using param with external xsl file

include = common.properties

java.MessageStoreSenderWithCidXsl.className = org.frankframework.senders.IbisJavaSender
java.MessageStoreSenderWithCidXsl.serviceName = ibis4test-WriteToMessageStoreWithCidXsl

# delete all lines from messageStore that are in related slotIds
step1.jdbc.deleteTableIbisStore.read = correlationid/jdbc-delete.xml

# make the messageStoreSender write a message
step2.java.MessageStoreSenderWithCidXsl.write = correlationid/in.xml

# read the result of the MessageStoreSender pipeline, which should be the message id
step3.java.MessageStoreSenderWithCidXsl.read = correlationid/out.xml

# verify there's one record present with the expected correlation id
step4.jdbc.selectQueue.read = correlationid/out-queue.xml
