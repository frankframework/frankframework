name: Renovate Lockfile Fixer

on:
  push:
    branches:
      - 'renovate/**'
    paths:
      - '**/package.json'
      - 'pnpm-lock.yaml'

permissions:
  contents: write

jobs:
  fix-lockfile:
    runs-on: ubuntu-latest
    if: github.actor == 'renovate[bot]' || contains(github.event.head_commit.message, 'renovate')

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.head_ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.9.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.18.0
          cache: 'pnpm'

      - name: Run pnpm install after dependency bump
        run: pnpm install --lockfile-only --ignore-scripts

      - name: Commit changes if necessary
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7
        with:
          commit_message: "chore(deps): update pnpm-lock.yaml after dependency bump"
          file_pattern: "pnpm-lock.yaml"
