# This workflow will build a Java project with Maven
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

name: Java CI with Maven

env:
  JDK_VERSION: 25
  PROFILES: frankframework,codecoverage,ci
  IS_DEPENDENCY_BOT: ${{ github.actor == 'dependabot[bot]' || github.actor == 'renovate[bot]' }}
  # Don't allow credentials on forks, secrets are not available when using forks or dependency bots
  USE_PROPRIETARY: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.owner.login == 'frankframework') && github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]' }}
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
  PR_NUMBER: ${{ github.event.number || '' }}
  MAVEN_GOALS: verify

on:
  push:
    branches:
      - master
      - '[0-9]+.[0-9]+-release'
      - 'release/[0-9]+.[0-9]+'
  pull_request:
    branches:
      - master
      - '[0-9]+.[0-9]+-release'
      - 'release/[0-9]+.[0-9]+'

jobs:
  check-changes:
    name: Check for relevant file changes
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: |
            relevant:
              - '**'
              - '!**/*.md'
              - '!**/*.txt'
              - '!**/*.png'
              - '!**/*.toml'
              - '!docker/**'
              - '!.github/**'
              - '.github/workflows/*.yml'

  build-maven-artifacts:
    name: Build and Test Maven Artifacts on JDK
    runs-on: ubuntu-latest
    needs: check-changes

    steps:
    - name: Skip build – no relevant file changes
      if: needs.check-changes.outputs.relevant != 'true'
      run: echo "Only ignored files were changed. Skipping build."

    - name: Checkout repository
      if: needs.check-changes.outputs.relevant == 'true'
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        # Number of commits to fetch. 0 indicates all history for all branches and tags.
        # Required for SonarCloud
        fetch-depth: 0

    - name: Set up Maven Dependency Cache
      if: needs.check-changes.outputs.relevant == 'true'
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: |
          ~/.m2/repository
        key: maven-dependency-cache-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          maven-dependency-cache-

    - name: Restore Sonar Cache
      if: needs.check-changes.outputs.relevant == 'true'
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: |
          ~/.sonar/cache
        key: sonar-cache-${{ github.base_ref }}
        restore-keys: |
          sonar-cache-refs/heads/master
          sonar-cache-

    - name: Set up JDK ${{ env.JDK_VERSION }}
      if: needs.check-changes.outputs.relevant == 'true'
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        distribution: 'temurin'
        java-version: ${{ env.JDK_VERSION }}

    - name: Install pnpm
      if: needs.check-changes.outputs.relevant == 'true'
      uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
      with:
        version: 10.28.2

    - name: Set up Node.js
      if: needs.check-changes.outputs.relevant == 'true'
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: 24.15.0
        cache: pnpm
        cache-dependency-path: '**/pnpm-lock.yaml'

    - name: Create Maven settings.xml file
      if: needs.check-changes.outputs.relevant == 'true' && env.USE_PROPRIETARY == 'true'
      uses: s4u/maven-settings-action@894661b3ddae382f1ae8edbeab60987e08cf0788 # v4.0.0
      with:
        servers: '[{"id": "proprietary", "username": "${{ secrets.CI_USER }}", "password": "${{ secrets.CI_PASS }}"}]'

    - name: Update Maven profiles
      if: needs.check-changes.outputs.relevant == 'true' && env.USE_PROPRIETARY == 'true'
      run: |
        echo "PROFILES=${{ env.PROFILES }},proprietary" >> $GITHUB_ENV

    - name: FrankDoc only on Java ${{ env.JDK_VERSION }} Build
      if: needs.check-changes.outputs.relevant == 'true'
      run: |
        echo "PROFILES=${{ env.PROFILES }},attachFrankDoc" >> $GITHUB_ENV

      # Secrets are not available when commits are made by dependency bots or from GH forks
    - name: Update environment to run on SonarSource
      if: needs.check-changes.outputs.relevant == 'true' && env.USE_PROPRIETARY == 'true' && env.IS_DEPENDENCY_BOT == 'false'
      run: |
        echo "MAVEN_GOALS=${{ env.MAVEN_GOALS }} org.sonarsource.scanner.maven:sonar-maven-plugin:sonar" >> $GITHUB_ENV

      # Use Maven Wrapper, so we can build with an older version of Maven, see PR #4579.
    - name: Build with Maven
      if: needs.check-changes.outputs.relevant == 'true'
      env:
        mailAddress: ${{ secrets.EXCHANGE_MAIL_ADDRESS }}
        clientId: ${{ secrets.EXCHANGE_MAIL_CLIENTID }}
        clientSecret: ${{ secrets.EXCHANGE_MAIL_CLIENTSECRET }}
        tenantId: ${{ secrets.EXCHANGE_MAIL_TENANTID }}
        baseFolder: "Inbox/${{env.PR_NUMBER}}-${{ env.JDK_VERSION }}"
        CI_SERVICE: GITHUB
        TZ: Europe/Amsterdam
        JAVA_OPTS: "-Xms1G -XX:+UseParallelGC"
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} # SonarCloud
      run: ./mvnw -B -V -T1 ${{env.MAVEN_GOALS}} -P${{env.PROFILES}} -Dsonar.projectKey=frankframework -Dsonar.organization=frank-framework

    - name: Upload coverage to Codecov
      if: needs.check-changes.outputs.relevant == 'true'
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
      continue-on-error: true #ignore failure when unable to upload the artifacts
      with:
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Upload coverage to Codacy
      if: needs.check-changes.outputs.relevant == 'true' && (env.USE_PROPRIETARY == 'true' || env.IS_DEPENDENCY_BOT == 'true')
      uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699 # v1
      continue-on-error: true #ignore failure when unable to upload the artifacts
      with:
        project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}

    - name: Store Test Results
      if: needs.check-changes.outputs.relevant == 'true' && (failure() || cancelled())
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: java${{ env.JDK_VERSION }}_Surefire
        path: ${{ github.workspace }}/*/target/surefire-reports/*

    - name: Store Test Logs
      if: needs.check-changes.outputs.relevant == 'true' && (failure() || cancelled())
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: java${{ env.JDK_VERSION }}_Logs
        path: ${{ github.workspace }}/*/target/test-logs/*

    - name: Store Cypress Results
      if: needs.check-changes.outputs.relevant == 'true' && failure()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: java${{ env.JDK_VERSION }}_Cypress
        path: ${{ github.workspace }}/*/target/test-classes/e2e/cypress/**

    - name: Store FrankDoc XSD
      if: needs.check-changes.outputs.relevant == 'true'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: java${{ env.JDK_VERSION }}_FrankDoc
        path: ${{ github.workspace }}/target/frankdoc/xml/xsd/*.xsd

    - name: Save Sonar Cache
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      if: |
        needs.check-changes.outputs.relevant == 'true' &&
        always() &&
        (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/release') || startsWith(github.ref, 'refs/heads/[0-9]+.[0-9]+-release'))
      with:
        path: |
          ~/.sonar/cache
        key: sonar-cache-${{ github.base_ref }}
