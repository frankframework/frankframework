# For most projects, this workflow file will not need changing; you simply need
# to commit it to your repository.
#
# You may wish to alter this file to override the set of languages analyzed,
# or to provide custom queries or build logic.
name: "CodeQL - Java"

env:
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
  PROFILES: frankframework,ci,skip-console-frontend
  USE_PROPRIETARY: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.owner.login == 'frankframework') && github.actor != 'dependabot[bot]' }}
  MAVEN_GOALS: test-compile

on:
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
      - "**.yml"
      - "**.txt"
      - "**.png"
      - ".github/**"
      - "!.github/workflows/codeql-java.yml"
      - "docker/**"
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [master]
    paths-ignore:
      - "**.md"
      - "**.yml"
      - "**.txt"
      - "**.png"
      - ".github/**"
      - "!.github/workflows/codeql-java.yml"
      - "docker/**"
  schedule:
    - cron: '0 23 * * 1'

jobs:
  analyze:
    name: Analyze Java
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        java: [ '25' ]
        
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Load Maven Dependency Cache
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: |
          ~/.m2/repository
        key: maven-dependency-cache-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          maven-dependency-cache-

    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        distribution: 'temurin'
        java-version: ${{ matrix.java }}

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@e46ed2cbd01164d986452f91f178727624ae40d7 # v4
      with:
        config-file: ./.github/codeql/codeql-config.yml
        trap-caching: false
        languages: java

    # Use Maven Wrapper, so we can build with an older version of Maven, see PR #4579.
    - name: Build with Maven
      env:
        CI_SERVICE: GITHUB
        TZ: Europe/Amsterdam
        JAVA_OPTS: "-Xms1G -XX:+UseParallelGC"
      run: ./mvnw -B -V -T1 ${{env.MAVEN_GOALS}} -P${{env.PROFILES}}

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@e46ed2cbd01164d986452f91f178727624ae40d7 # v4
      with:
        category: "/java:${{matrix.java}}"
